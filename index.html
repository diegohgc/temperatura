<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1e3a5f">
<title>Temperatura</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(160deg, #1e3a5f, #3a6ea5);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: env(safe-area-inset-top, 20px) 20px env(safe-area-inset-bottom, 20px);
  }
  .card {
    text-align: center;
    width: 100%;
    max-width: 360px;
  }
  .ciudad {
    font-size: 1.2rem;
    opacity: 0.85;
    margin-bottom: 4px;
  }
  .icono {
    width: 72px;
    height: 72px;
    margin: 8px auto 0;
  }
  .icono svg {
    width: 100%;
    height: 100%;
    stroke: #fff;
    fill: none;
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .temp {
    font-size: 5rem;
    font-weight: 600;
    line-height: 1;
    margin: 4px 0 12px;
  }
  .desc {
    font-size: 1.1rem;
    opacity: 0.9;
    margin-bottom: 24px;
  }
  .detalles {
    display: flex;
    justify-content: center;
    gap: 24px;
    font-size: 0.95rem;
    opacity: 0.8;
    margin-bottom: 28px;
  }
  button {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.4);
    color: #fff;
    padding: 10px 22px;
    border-radius: 24px;
    font-size: 0.95rem;
    cursor: pointer;
  }
  button:active { background: rgba(255,255,255,0.3); }
  .estado {
    margin-top: 20px;
    font-size: 0.9rem;
    opacity: 0.75;
    min-height: 1.2em;
  }
  .marea {
    font-size: 0.95rem;
    opacity: 0.9;
    margin-bottom: 20px;
    min-height: 1.2em;
  }
  .horas {
    display: flex;
    gap: 14px;
    overflow-x: auto;
    padding: 4px 4px 16px;
    margin-bottom: 8px;
  }
  .hora {
    flex: 0 0 auto;
    text-align: center;
    min-width: 46px;
  }
  .hora .h {
    font-size: 0.8rem;
    opacity: 0.75;
    margin-bottom: 4px;
  }
  .hora .icono-hora {
    width: 30px;
    height: 30px;
    margin: 0 auto 4px;
  }
  .hora .icono-hora svg {
    width: 100%;
    height: 100%;
    stroke: #fff;
    fill: none;
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .hora .t {
    font-size: 0.9rem;
    font-weight: 600;
  }
  .hora .p {
    font-size: 0.75rem;
    opacity: 0.8;
    color: #bfe0ff;
    margin-top: 2px;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="ciudad" id="ciudad">—</div>
    <div class="icono" id="icono"></div>
    <div class="temp" id="temp">--°</div>
    <div class="desc" id="desc"></div>
    <div class="detalles">
      <span id="sensacion"></span>
      <span id="viento"></span>
      <span id="humedad"></span>
    </div>
    <div class="marea" id="marea"></div>
    <div class="marea" id="altitud"></div>
    <div class="detalles" id="solInfo"></div>
    <div class="horas" id="horas"></div>
    <button id="btnActualizar">Actualizar</button>
    <div class="estado" id="estado"></div>
  </div>

<script>
const elTemp = document.getElementById('temp');
const elDesc = document.getElementById('desc');
const elCiudad = document.getElementById('ciudad');
const elSensacion = document.getElementById('sensacion');
const elViento = document.getElementById('viento');
const elHumedad = document.getElementById('humedad');
const elEstado = document.getElementById('estado');
const elMarea = document.getElementById('marea');
const elAltitud = document.getElementById('altitud');
const elIcono = document.getElementById('icono');
const elHoras = document.getElementById('horas');
const elSolInfo = document.getElementById('solInfo');
const btn = document.getElementById('btnActualizar');

const ICONOS = {
  sol: '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4.5"/><path d="M12 1.5v3M12 19.5v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M1.5 12h3M19.5 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"/></svg>',
  solNube: '<svg viewBox="0 0 24 24"><path d="M8.5 4a4 4 0 0 1 3.9 3.1"/><circle cx="8.5" cy="8" r="3.5"/><path d="M7 19.5h10.5a3.5 3.5 0 0 0 .5-6.96A5 5 0 0 0 8.6 11.2 4 4 0 0 0 7 19.5z"/></svg>',
  nube: '<svg viewBox="0 0 24 24"><path d="M6.5 18.5h11a3.5 3.5 0 0 0 .5-6.96 5 5 0 0 0-9.62-1.65A4 4 0 0 0 6.5 18.5z"/></svg>',
  niebla: '<svg viewBox="0 0 24 24"><path d="M5 9.5h11a3.2 3.2 0 0 0 0-6.4 4.6 4.6 0 0 0-8.6-1.5A3.6 3.6 0 0 0 5 9.5z"/><path d="M3 14h18M3 17.5h18M3 21h18"/></svg>',
  llovizna: '<svg viewBox="0 0 24 24"><path d="M6.5 13.5h11a3.5 3.5 0 0 0 .5-6.96A5 5 0 0 0 8.6 5.85 4 4 0 0 0 6.5 13.5z"/><path d="M9 17v3M13 17v3M17 17v3"/></svg>',
  lluvia: '<svg viewBox="0 0 24 24"><path d="M6.5 12.5h11a3.5 3.5 0 0 0 .5-6.96A5 5 0 0 0 8.6 4.85 4 4 0 0 0 6.5 12.5z"/><path d="M8 16l-1.5 4M13 16l-1.5 4M18 16l-1.5 4"/></svg>',
  nieve: '<svg viewBox="0 0 24 24"><path d="M6.5 12.5h11a3.5 3.5 0 0 0 .5-6.96A5 5 0 0 0 8.6 4.85 4 4 0 0 0 6.5 12.5z"/><path d="M9 17v4M7.3 18.2l3.4 1.6M11.3 18.2l-3.4 1.6M15 17v4M13.3 18.2l3.4 1.6M17.3 18.2l-3.4 1.6"/></svg>',
  tormenta: '<svg viewBox="0 0 24 24"><path d="M6.5 11.5h11a3.5 3.5 0 0 0 .5-6.96A5 5 0 0 0 8.6 3.85 4 4 0 0 0 6.5 11.5z"/><path d="M13 11.5l-3 5h3l-2 4.5 5.5-6.5h-3z"/></svg>',
  luna: '<svg viewBox="0 0 24 24"><path d="M16.5 3.5a8.5 8.5 0 1 0 4 9.4 7 7 0 0 1-4-9.4z"/></svg>',
  lunaNube: '<svg viewBox="0 0 24 24"><path d="M8.8 9.3a3.3 3.3 0 0 1 2.1-5.5 2.4 2.4 0 0 0 2.4 3.3 4.7 4.7 0 0 1-1.6 4.9"/><path d="M7 19.5h10.5a3.5 3.5 0 0 0 .5-6.96A5 5 0 0 0 8.6 11.2 4 4 0 0 0 7 19.5z"/></svg>',
};

function iconoParaCodigo(codigo, esDia = true) {
  if (codigo === 0) return esDia ? ICONOS.sol : ICONOS.luna;
  if (codigo === 1 || codigo === 2) return esDia ? ICONOS.solNube : ICONOS.lunaNube;
  if (codigo === 3) return ICONOS.nube;
  if (codigo === 45 || codigo === 48) return ICONOS.niebla;
  if (codigo >= 51 && codigo <= 55) return ICONOS.llovizna;
  if ((codigo >= 61 && codigo <= 65) || (codigo >= 80 && codigo <= 82)) return ICONOS.lluvia;
  if (codigo >= 71 && codigo <= 75) return ICONOS.nieve;
  if (codigo >= 95) return ICONOS.tormenta;
  return ICONOS.solNube;
}

const STORMGLASS_KEY = '625f0ace-6f35-11f1-99cb-0242ac120004-625f0b78-6f35-11f1-99cb-0242ac120004';

const CODIGOS = {
  0: 'Despejado', 1: 'Mayormente despejado', 2: 'Parcialmente nublado', 3: 'Nublado',
  45: 'Niebla', 48: 'Niebla helada',
  51: 'Llovizna ligera', 53: 'Llovizna', 55: 'Llovizna intensa',
  61: 'Lluvia ligera', 63: 'Lluvia', 65: 'Lluvia intensa',
  71: 'Nieve ligera', 73: 'Nieve', 75: 'Nieve intensa',
  80: 'Chubascos ligeros', 81: 'Chubascos', 82: 'Chubascos intensos',
  95: 'Tormenta', 96: 'Tormenta con granizo', 99: 'Tormenta fuerte con granizo'
};

function setEstado(msg) { elEstado.textContent = msg; }

async function obtenerCiudad(lat, lon) {
  try {
    const r = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=es`);
    const data = await r.json();
    const barrio = data.locality;
    const ciudad = data.city;
    if (barrio && ciudad && barrio !== ciudad) return `${barrio}, ${ciudad}`;
    if (ciudad) return ciudad;
    if (barrio) return barrio;
  } catch (e) {}
  return 'Tu ubicación';
}

async function obtenerTiempo(lat, lon) {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,is_day&hourly=temperature_2m,precipitation_probability,weather_code,is_day&daily=sunrise,sunset&forecast_days=2&timezone=auto`;
  const r = await fetch(url);
  if (!r.ok) throw new Error('Error al consultar el tiempo');
  return r.json();
}

function renderHoras(hourly) {
  elHoras.innerHTML = '';
  if (!hourly || !hourly.time) return;
  const ahora = Date.now();
  const indices = hourly.time
    .map((t, i) => ({ i, t: new Date(t).getTime() }))
    .filter((x) => x.t >= ahora)
    .slice(0, 8);

  for (const { i, t } of indices) {
    const hora = new Date(t).getHours() + 'h';
    const temp = Math.round(hourly.temperature_2m[i]);
    const prob = hourly.precipitation_probability ? hourly.precipitation_probability[i] : null;
    const div = document.createElement('div');
    div.className = 'hora';
    div.innerHTML = `
      <div class="h">${hora}</div>
      <div class="icono-hora">${iconoParaCodigo(hourly.weather_code[i], hourly.is_day ? hourly.is_day[i] === 1 : true)}</div>
      <div class="t">${temp}°</div>
      ${prob !== null ? `<div class="p">${prob}%</div>` : ''}
    `;
    elHoras.appendChild(div);
  }
}

function renderSol(daily) {
  elSolInfo.innerHTML = '';
  if (!daily || !daily.sunrise || !daily.sunrise[0]) return;
  const amanecer = new Date(daily.sunrise[0]).toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
  const anochecer = new Date(daily.sunset[0]).toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
  elSolInfo.innerHTML = `<span>Amanecer ${amanecer}</span><span>Anochecer ${anochecer}</span>`;
}

async function obtenerMarea(lat, lon) {
  const ahora = Math.floor(Date.now() / 1000);
  const inicio = ahora - 6 * 3600;
  const fin = ahora + 24 * 3600;
  const url = `https://api.stormglass.io/v2/tide/extremes/point?lat=${lat}&lng=${lon}&start=${inicio}&end=${fin}`;
  const r = await fetch(url, { headers: { Authorization: STORMGLASS_KEY } });
  if (!r.ok) throw new Error('Error al consultar la marea');
  const data = await r.json();
  const extremos = (data.data || [])
    .map((e) => ({ tipo: e.type, hora: new Date(e.time) }))
    .sort((a, b) => a.hora - b.hora);

  const proximo = extremos.find((e) => e.hora.getTime() > Date.now());
  if (!proximo) return null;

  const subiendo = proximo.tipo === 'high';
  const horaTexto = proximo.hora.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
  return subiendo
    ? `Marea subiendo · pleamar a las ${horaTexto}`
    : `Marea bajando · bajamar a las ${horaTexto}`;
}

async function obtenerElevacionTerreno(lat, lon) {
  const r = await fetch(`https://api.open-meteo.com/v1/elevation?latitude=${lat}&longitude=${lon}`);
  if (!r.ok) throw new Error('Error al consultar la elevación');
  const data = await r.json();
  return data.elevation && data.elevation.length ? data.elevation[0] : null;
}

async function obtenerAltitud(lat, lon) {
  const elevacion = await obtenerElevacionTerreno(lat, lon);
  if (elevacion === null) return null;
  return `Altitud ${Math.round(elevacion)} m`;
}

async function actualizar() {
  setEstado('Localizando...');
  elTemp.textContent = '--°';
  elDesc.textContent = '';

  if (!navigator.geolocation) {
    setEstado('Geolocalización no disponible en este navegador.');
    return;
  }

  navigator.geolocation.getCurrentPosition(async (pos) => {
    const { latitude, longitude } = pos.coords;
    setEstado('Consultando temperatura...');
    try {
      const [tiempo, ciudad, marea, altitudTexto] = await Promise.all([
        obtenerTiempo(latitude, longitude),
        obtenerCiudad(latitude, longitude),
        obtenerMarea(latitude, longitude).catch(() => null),
        obtenerAltitud(latitude, longitude).catch(() => null)
      ]);
      const c = tiempo.current;
      elCiudad.textContent = ciudad;
      elTemp.textContent = Math.round(c.temperature_2m) + '°';
      elDesc.textContent = CODIGOS[c.weather_code] || '';
      elIcono.innerHTML = iconoParaCodigo(c.weather_code, c.is_day === 1);
      renderHoras(tiempo.hourly);
      renderSol(tiempo.daily);
      elSensacion.textContent = 'Sensación ' + Math.round(c.apparent_temperature) + '°';
      elViento.textContent = Math.round(c.wind_speed_10m) + ' km/h';
      elHumedad.textContent = c.relative_humidity_2m + '% hum.';
      elMarea.textContent = marea || '';
      elAltitud.textContent = altitudTexto || '';
      setEstado('Actualizado ' + new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' }));
    } catch (e) {
      setEstado('No se pudo obtener la temperatura.');
    }
  }, (err) => {
    if (err.code === err.PERMISSION_DENIED) {
      setEstado('Permiso de ubicación denegado. Actívalo para ver la temperatura.');
    } else {
      setEstado('No se pudo obtener tu ubicación.');
    }
  }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 });
}

btn.addEventListener('click', actualizar);
window.addEventListener('load', actualizar);

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
